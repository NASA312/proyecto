{% load crispy_forms_tags %}
<!-- modal_form.html -->
<div class="modal fade" id="{{ modal_id|default:"agregarModal" }}" data-backdrop="static" data-keyboard="false" tabindex="-1" aria-labelledby="{{ modal_id|default:"agregarModal" }}Label" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="{{ modal_id|default:"agregarModal" }}Label">
                    {{ modal_title|default:"Agregar Registro" }}
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Cerrar">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <div class="modal-body">
                <form method="post" class="form-horizontal">
                    {% csrf_token %}
                    <div class="card-body p-3">
                        {% crispy form %}
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
