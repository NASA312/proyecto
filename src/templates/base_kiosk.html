{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Control de Acceso{% endblock %} — Guardería</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/adminlte.min.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

  {% block css %}{% endblock %}

  <style>
    html, body { height: 100%; background: #0d1117; margin: 0; padding: 0; }

    .kiosk-wrapper { min-height: 100vh; display: flex; flex-direction: column; }

    .kiosk-topbar {
      background: #0d1117;
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .kiosk-topbar .brand {
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .kiosk-topbar .brand i { color: #e94560; font-size: 1.2rem; }

    .btn-login-kiosk {
      color: rgba(255,255,255,.5);
      font-size: .8rem;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      padding: 6px 14px;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }
    .btn-login-kiosk:hover {
      color: #fff;
      border-color: rgba(255,255,255,.4);
      text-decoration: none;
    }

    .hora {
      color: rgba(255,255,255,.45);
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .5px;
      white-space: nowrap;
    }

    .kiosk-content { flex: 1; padding: 0; background: #0d1117; }

    .kiosk-footer {
      background: #0d1117;
      border-top: 1px solid rgba(255,255,255,.07);
      color: rgba(255,255,255,.25);
      text-align: center;
      font-size: .72rem;
      padding: 10px;
    }
  </style>
</head>

<body>
<div class="kiosk-wrapper">

  <div class="kiosk-topbar">
    <span class="brand">
      <i class="fas fa-baby"></i> Guardería — Control de Acceso
    </span>

    <a href="{% url 'auth:login' %}" class="btn-login-kiosk">
      <i class="fas fa-lock" style="margin-right:6px;"></i>Iniciar Sesión
    </a>

    <span class="hora" id="reloj-kiosk">--:--:--</span>
  </div>

  <div class="kiosk-content">
    {% block content %}{% endblock %}
  </div>

  <div class="kiosk-footer">
    Sistema de Control de Acceso &nbsp;·&nbsp; {% now "Y" %}
  </div>

</div>

<script src="{% static 'plugins/jquery/jquery.min.js' %}"></script>
<script src="{% static 'plugins/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'js/adminlte.min.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

{% block scripts %}{% endblock %}

<script>
  function tickReloj() {
    var a      = new Date();
    var h24    = a.getHours();
    var h      = String(h24 % 12 || 12).padStart(2, '0');
    var m      = String(a.getMinutes()).padStart(2, '0');
    var s      = String(a.getSeconds()).padStart(2, '0');
    var ampm   = h24 >= 12 ? 'PM' : 'AM';
    var el     = document.getElementById('reloj-kiosk');
    if (el) el.textContent = h + ':' + m + ':' + s + ' ' + ampm;
  }
  tickReloj();
  setInterval(tickReloj, 1000);
</script>
</body>
</html>
