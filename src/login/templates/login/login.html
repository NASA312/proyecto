{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión | Guardería</title>

    <!-- Google Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600,700&display=fallback">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- icheck bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/icheck-bootstrap@3.0.1/icheck-bootstrap.min.css">
    <!-- AdminLTE -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>

<body class="hold-transition login-page bg-light">

<div class="login-box">
    <div class="card shadow-lg">
        <!-- Header -->
        <div class="card-header text-center bg-primary">
            <h1 class="h4 mb-0 text-white">
                <i class="fas fa-child mr-2"></i>
                Guardería
            </h1>
            <small class="text-white-50">Sistema de Control</small>
        </div>

        <div class="card-body login-card-body">
            <p class="login-box-msg font-weight-bold">
                <i class="fas fa-users mr-1"></i> Acceso para Trabajadores
            </p>

            <!-- Mensajes -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                        <i class="fas 
                            {% if message.tags == 'success' %}fa-check-circle
                            {% elif message.tags == 'error' %}fa-times-circle
                            {% else %}fa-info-circle{% endif %}
                        mr-2"></i>
                        {{ message }}
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Login Form -->
            <form method="post" action="{% url 'auth:login' %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div class="input-group mb-3">
                    <input type="text" name="usuario" class="form-control" placeholder="Usuario" required autofocus>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-user"></span>
                        </div>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <input type="password" name="contrasena" class="form-control" placeholder="Contraseña" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-lock"></span>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-8">
                        <div class="icheck-primary">
                            <input type="checkbox" id="remember">
                            <label for="remember">
                                Recordarme
                            </label>
                        </div>
                    </div>
                    <div class="col-4">
                        <button type="submit" class="btn btn-primary btn-block">
                            Entrar
                        </button>
                    </div>
                </div>
            </form>

            <hr>

            <!-- Tutor Section -->
            <p class="text-center font-weight-bold mb-2">
                <i class="fas fa-user-shield mr-1"></i> Padres / Tutores
            </p>

            <a href="{% url 'guarderia:verificar_huella_tutor' %}" class="btn btn-success btn-block">
                <i class="fas fa-fingerprint mr-2"></i>
                Verificación por Huella
            </a>

            <p class="mt-3 mb-0 text-center">
                <a href="#" class="text-muted">
                    <i class="fas fa-question-circle mr-1"></i> ¿Olvidaste tu contraseña?
                </a>
            </p>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
